{% extends "base.html" %}

{% block title %}Account Security - Reset Password{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card bg-dark text-white border-success">
                <div class="card-header border-success">
                    <h4 class="mb-0">Password Reset</h4>
                </div>
                <div class="card-body">
                    <!-- Standard Flash Messages for Error/Success -->
                    {% if error %}
                        <div class="alert alert-danger" role="alert">
                            {{ error }}
                        </div>
                    {% endif %}
                    {% if success %}
                        <div class="alert alert-success" role="alert">
                            {{ success }}
                        </div>
                    {% endif %}

                    <!-- 
                        RED TEAM DEFENSE: 
                        We removed the <select> dropdown. This stops 'Account Enumeration' 
                        where hackers can see every valid username on your system.
                    -->
                    <form action="/forgot_password" method="post">
                        <div class="form-group mb-3">
                            <label for="username">Username</label>
                            <!-- 
                                FIXED: Changed from <select> to <input type="text">. 
                                This forces an attacker to actually KNOW the username.
                            -->
                            <input type="text" id="username" name="username" class="form-control" 
                                   placeholder="Enter username" required autocomplete="off">
                        </div>                        
                        <div class="form-group mb-3">
                            <label for="password">New Password</label>
                            <input type="password" id="password" name="password" class="form-control" 
                                   placeholder="Enter new password" required autocomplete="new-password">
                        </div>                        
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-success">Update Password</button>
                        </div>
                    </form>
                    
                    <p class="mt-3 text-center">
                        <small class="text-muted">Note: You must be logged in to reset your own password.</small><br>
                        <a href="{{ url_for('login.login') }}" class="text-success">Return to Login</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
