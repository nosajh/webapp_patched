{% extends "base.html" %}

{% block title %}Account Registration{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card bg-dark text-white border-success">
                <div class="card-header border-success">
                    <h4 class="mb-0">Create Your Account</h4>
                </div>
                <div class="card-body">
                    {% if error %}
                        <div class="alert alert-danger" role="alert">
                            {{ error }}
                        </div>
                    {% endif %}
                    {% if success %}
                        <div class="alert alert-success" role="alert">
                            {{ success }}
                        </div>
                    {% endif %}
                    
                    <form action="/register" method="post">
                        <div class="form-group mb-3">
                            <label for="register-username">Username</label>
                            <!-- FIXED: added autocomplete="off" to prevent local data leaks -->
                            <input type="text" id="register-username" name="username" class="form-control" required autocomplete="off">
                        </div>
                        
                        <div class="form-group mb-3">
                            <label for="register-password">Password</label>
                            <!-- FIXED: added new-password to assist browser security managers -->
                            <input type="password" id="register-password" name="password" class="form-control" required autocomplete="new-password">
                        </div>
                        
                        <div class="form-group mb-3">
                            <label for="register-role">Account Type</label>
                            <!-- 
                                CRITICAL SECURITY FIX: 
                                We REMOVED the "admin" option. 
                                Only Students and Instructors can register themselves. 
                            -->
                            <select id="register-role" name="role" class="form-control" required>
                                <option value="student" selected>Student</option>
                                <option value="instructor">Instructor</option>
                            </select>
                        </div>
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-success">Register Account</button>
                        </div>
                    </form>
                    
                    <p class="mt-3 text-center">
                        Already have an account? <a href="{{ url_for('login.login') }}" class="text-success">Login here</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
